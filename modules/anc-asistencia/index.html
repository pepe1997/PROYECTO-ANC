<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANC Logistica | Asistencia</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="topbar">
    <div>
      <strong>ANC Logistica</strong>
      <span id="estadoCarga">Preparando asistencia...</span>
    </div>
  </header>

  <main class="shell">
    <section class="panel">
      <div class="module-head">
        <div>
          <h1>Asistencia Trujillo</h1>
          <p>Control diario de asistencia por turno.</p>
        </div>
        <button class="soft" onclick="verGlobal()">Ver reporte general</button>
      </div>

      <nav class="tabs">
        <button onclick="verDashboard()">Dashboard</button>
        <button onclick="verPersonal()">Personal</button>
        <button onclick="verInicioTurno()">Inicio de turno</button>
        <button onclick="verDiario()">Reporte diario</button>
        <button onclick="verInformeAsistencia()">Informe asistencia</button>
        <button onclick="verGlobal()">Reporte global</button>
        <button onclick="verRegularizacion()">Regularizacion</button>
      </nav>

      <div id="app">
        <div class="loading">Cargando datos...</div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>

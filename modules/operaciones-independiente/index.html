<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANC Logistica | Control Operativo</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <section id="loginView" class="login-view">
    <form class="login-card" onsubmit="login(event)">
      <div class="brand-mark">ANC</div>
      <h1>ANC Logistica</h1>
      <label>Usuario<input id="usuario" autocomplete="username" required></label>
      <label>Contrasena<input id="password" type="password" autocomplete="current-password" required></label>
      <button>Ingresar</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </section>

  <section id="appView" hidden>
    <header class="topbar">
      <div>
        <strong>ANC Logistica</strong>
        <span id="estadoCarga">Esperando datos...</span>
      </div>
      <div class="topbar-actions">
        <span id="usuarioActivo" class="user-pill"></span>
        <button class="ghost" onclick="logout()">Salir</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="module-head">
          <div>
            <h1>Centro de control operativo</h1>
          </div>
          <button class="soft" onclick="exportarImagen('modulo', 'operaciones')">Imagen</button>
        </div>

        <nav class="tabs">
          <button onclick="verLpns()">LPNs</button>
          <button onclick="verOptimizarReserva()">Optimizar reserva</button>
          <button onclick="verLpnsAntiguos()">LPNs antiguos</button>
          <button onclick="verPuntosControl()">Puntos control</button>
          <button onclick="verInventario()">Inventario</button>
          <button onclick="verSlotting()">Slotting</button>
          <button onclick="verBloqueo()">Bloqueo</button>
          <button onclick="verBusquedaProducto()">Busqueda producto</button>
          <button onclick="verDiagnostico()">Diagnostico</button>
        </nav>

        <div id="modulo">
          <div class="loading">Preparando modulo...</div>
        </div>
      </section>
    </main>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANC Logistica | Asignacion Operacional</title>
  <link rel="stylesheet" href="css/asignacion.css">
</head>
<body>
  <script src="js/asignacion.js"></script>
  <section id="loginView" class="login-view">
    <form class="login-card" onsubmit="login(event)">
      <div class="brand-row login-brand-row">
        <div class="login-mark">ANC</div>
        <div>
          <strong>ANC Logistica</strong>
          <span>Operacion Logistica</span>
        </div>
      </div>
      <h1>Asignacion Operacional</h1>
      <p>Reporte logistico para cobertura, reserva, paletero y sin stock.</p>
      <label>
        Usuario
        <input id="usuario" type="text" autocomplete="username" required>
      </label>
      <label>
        Contrasena
        <input id="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Ingresar</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </section>

  <section id="appView" class="app-view" hidden>
    <div class="workspace">
      <header class="topbar">
        <div>
          <strong>ANC Logistica</strong>
          <span id="estadoCarga">Esperando carga...</span>
        </div>
        <div class="topbar-actions">
          <span id="usuarioActivo" class="user-pill"></span>
          <button onclick="recargarDatos()">Actualizar</button>
          <button class="secondary" onclick="resetOperarios()">Reiniciar avance</button>
          <button class="ghost" onclick="logout()">Salir</button>
        </div>
      </header>

      <main class="layout">
        <section id="modulo" class="panel">
          <div class="loading">Preparando asignacion...</div>
        </section>
      </main>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
